ShortDescription: A fast, lightweight local file editor for Windows — a friendlier replacement for Notepad.
Description: |-
  Marker is a fast, lightweight local file editor for Windows — a friendlier
  replacement for Notepad for daily note-taking and casual editing of text
  files. It has workspaces, a live file tree, a tabbed editor, markdown editing
  three ways (source, WYSIWYG, rendered), per-workspace scratchpads, and light
  and dark themes. Files on disk stay plain files — no proprietary format.
